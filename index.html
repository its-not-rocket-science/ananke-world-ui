<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ananke World UI</title>
    <style>
      /* ── Reset & base ───────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 15px;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ─────────────────────────────────────────────────────────── */
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      header h1 { font-size: 1.1rem; font-weight: 600; color: #a78bfa; }
      header p { font-size: 0.8rem; color: #64748b; }

      /* ── Tab nav ─────────────────────────────────────────────────────────── */
      nav {
        display: flex;
        gap: 0;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        padding: 0 1.5rem;
      }
      nav button {
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 0.6rem 1rem;
        transition: color 0.15s, border-color 0.15s;
      }
      nav button:hover { color: #e2e8f0; }
      nav button.active { color: #a78bfa; border-bottom-color: #a78bfa; }

      /* ── Tab panels ─────────────────────────────────────────────────────── */
      main { flex: 1; padding: 1.5rem; }
      .panel { display: none; }
      .panel.active { display: block; }

      /* ── Panel content ───────────────────────────────────────────────────── */
      .panel h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: #c4b5fd; }
      .panel p.subtitle {
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 1rem;
        border-left: 2px solid #2d3148;
        padding-left: 0.5rem;
      }
      .card {
        background: #1a1d27;
        border: 1px solid #2d3148;
        border-radius: 6px;
        padding: 1rem;
        max-width: 640px;
      }
      label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
      select, input[type="range"], input[type="number"], input[type="text"] {
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 4px;
        color: #e2e8f0;
        font-size: 0.85rem;
        padding: 0.35rem 0.5rem;
        width: 100%;
        margin-bottom: 0.75rem;
      }
      button.primary {
        background: #6d28d9;
        border: none;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 0.45rem 1rem;
        transition: background 0.15s;
      }
      button.primary:hover { background: #7c3aed; }
      .output {
        background: #0f1117;
        border: 1px solid #2d3148;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.78rem;
        color: #a5f3fc;
        margin-top: 1rem;
        padding: 0.75rem;
        min-height: 80px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Ananke World UI</h1>
        <p>Design worlds &bull; Run simulations &bull; View replays</p>
      </div>
    </header>

    <nav>
      <button class="active" data-tab="scenario">Scenario Builder</button>
      <button data-tab="species">Species Designer</button>
      <button data-tab="world">World Sim</button>
      <button data-tab="replay">Replay Viewer</button>
      <button data-tab="validation">Validation</button>
    </nav>

    <main>
      <div id="tab-scenario" class="panel active"></div>
      <div id="tab-species"  class="panel"></div>
      <div id="tab-world"    class="panel"></div>
      <div id="tab-replay"   class="panel"></div>
      <div id="tab-validation" class="panel"></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
